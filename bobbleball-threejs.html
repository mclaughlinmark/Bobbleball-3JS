<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Bobble Baseball</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<canvas id="c"></canvas>

<div id="playerBug" class="player-bug"></div>

<div id="scoreBug" class="score-bug"></div>

<div id="homerunOverlay" class="homerun-overlay">
  <div id="homerunText" class="homerun-text">HOMERUN!</div>
  <div id="confettiLayer" class="confetti-layer"></div>
</div>

<div id="pitchCallText" class="pitch-call-text">Strike!</div>

<div id="subMenu" class="sub-menu"></div>

<!-- The import map must live inline in the HTML: it has to be parsed before
     any module script loads, and external import maps aren't widely supported. -->
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module" src="game.js"></script>
</body>
</html>
